name: iOS-ipa-build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Clean and Setup Pods
        run: |
          cd ios
          # This forces the platform version in the Podfile dynamically
          sed -i '' "s/^# platform :ios, '9.0'/platform :ios, '14.0'/" Podfile
          sed -i '' "s/^platform :ios, '10.0'/platform :ios, '14.0'/" Podfile
          sed -i '' "s/^platform :ios, '11.0'/platform :ios, '14.0'/" Podfile
          sed -i '' "s/^platform :ios, '12.0'/platform :ios, '14.0'/" Podfile
          sed -i '' "s/^platform :ios, '13.0'/platform :ios, '14.0'/" Podfile
          rm -rf Pods
          rm -f Podfile.lock
          pod install --repo-update

      - name: Build iOS App (release)
        # --no-codesign is key for CI without Apple Certificates
        run: flutter build ios --release --no-codesign

      - name: Prepare IPA packaging
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload
          zip -qq -r -9 FlutterIpaExport.ipa Payload

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: FlutterIpaExport.ipa
          tag: v1.0
          overwrite: true
          body: "Release with fixed iOS deployment target (14.0) for workmanager plugin."
